name: gestor-de-loterias
services:
  gestor-de-loterias:
    container_name: gestor-de-loterias
    image: guslma/gestor-de-loterias:latest
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    environment:
      DATABASE_URL: postgresql://gestor:gestor@postgres:5432/gestor
    volumes:
      - type: bind
        source: /DATA/AppData/gestor-de-loterias/uploads
        target: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      icon: "https://cdn.jsdelivr.net/gh/guslma/financeiro-loteria-gerenciador@v1.0.0/frontend/public/icon-512x512.png"

  postgres:
    container_name: gestor-de-loterias-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: gestor
      POSTGRES_DB: gestor
    volumes:
      - type: bind
        source: /DATA/AppData/gestor-de-loterias/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  default:
    name: gestor-de-loterias_default

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: "https://cdn.jsdelivr.net/gh/guslma/financeiro-loteria-gerenciador@v1.0.0/frontend/public/icon-512x512.png"
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: gestor-de-loterias
  title:
    custom: ""
    en_us: Gestor de Loterias
