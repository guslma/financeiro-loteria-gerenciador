services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/app.db
      SESSION_SECRET: ${SESSION_SECRET}
      SEED_USERNAME: ${SEED_USERNAME:-}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
    volumes:
      - db:/data
      - uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  db:
  uploads:
