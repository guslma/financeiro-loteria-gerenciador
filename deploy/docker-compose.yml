name: gestor-de-loterias
services:
  gestor-de-loterias:
    container_name: gestor-de-loterias
    image: seugu/gestor-de-loterias:latest
    network_mode: bridge
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    environment:
      DATABASE_URL: file:/data/app.db
    volumes:
      - type: volume
        source: db
        target: /data
      - type: volume
        source: uploads
        target: /app/public/uploads
    restart: unless-stopped
    labels:
      icon: "http://localhost:3000/icon-512x512.png"
volumes:
  db:
  uploads:
networks:
  default:
    name: gestor-de-loterias_default
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: "http://localhost:3000/icon-512x512.png"
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: gestor-de-loterias
  title:
    custom: ""
    en_us: Gestor de Loterias
