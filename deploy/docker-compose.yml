name: gestor-de-loterias

services:
  gestor-de-loterias:
    container_name: gestor-de-loterias
    image: guslma/gestor-de-loterias:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gestor:SENHA_FORTE_AQUI@postgres:5432/gestor
      APP_USERNAME: admin
      APP_PASSWORD: TROQUE_ESTA_SENHA
      APP_JWT_SECRET: TROQUE_ESTA_CHAVE_SECRETA
    volumes:
      - /DATA/AppData/gestor-de-loterias/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gestor-net
    restart: unless-stopped
    labels:
      icon: "https://cdn.jsdelivr.net/gh/guslma/financeiro-loteria-gerenciador@v1.0.0/frontend/public/icon-512x512.png"

  postgres:
    container_name: gestor-de-loterias-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: SENHA_FORTE_AQUI
      POSTGRES_DB: gestor
    volumes:
      - /DATA/AppData/gestor-de-loterias/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor -d gestor"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      gestor-net:
        aliases:
          - postgres
    restart: unless-stopped

networks:
  gestor-net:
    name: gestor-de-loterias_default

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: "https://cdn.jsdelivr.net/gh/guslma/financeiro-loteria-gerenciador@v1.0.0/frontend/public/icon-512x512.png"
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: gestor-de-loterias
  title:
    custom: ""
    en_us: Gestor de Loterias