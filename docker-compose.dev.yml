name: gestor-de-loterias-dev
services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gestor:${POSTGRES_PASSWORD:-gestor}@postgres:5432/gestor
      UPLOADS_DIR: /app/backend/uploads
      CHOKIDAR_USEPOLLING: "true"
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-secret-troque-em-producao}
      SESSION_VERSION: ${SESSION_VERSION:-1}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      OCR_SERVICE_URL: http://ocr:8000
      OLLAMA_URL: ${OLLAMA_URL:-http://192.168.1.10:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5vl:3b}
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
      - ./database:/app/database
    depends_on:
      postgres:
        condition: service_healthy
      ocr:
        condition: service_started
    restart: unless-stopped

  ocr:
    build:
      context: services/ocr
    platform: linux/amd64
    ports:
      - "8001:8000"
    volumes:
      - ocr-models-dev:/root/.paddleocr
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:3000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestor}
      POSTGRES_DB: gestor
    volumes:
      - db-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db-dev:
  ocr-models-dev:
