name: gestor-de-loterias
services:
  app:
    image: guslma/gestor-de-loterias:latest
    build: .
    ports:
      - "3000:3000"
    labels:
      icon: "http://localhost:3000/icon-512x512.png"
      org.opencontainers.image.title: "Gestor de Loterias"
      org.opencontainers.image.description: "Gestão financeira para lotéricas"
    environment:
      DATABASE_URL: postgresql://gestor:gestor@postgres:5432/gestor
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: gestor
      POSTGRES_DB: gestor
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db:
  uploads:
