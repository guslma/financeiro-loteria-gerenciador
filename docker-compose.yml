name: gestor-de-loterias
services:
  app:
    image: guslma/gestor-de-loterias:latest
    build: .
    ports:
      - "3000:3000"
    labels:
      icon: "https://cdn.jsdelivr.net/gh/guslma/financeiro-loteria-gerenciador@v1.0.0/frontend/public/icon-512x512.png"
      org.opencontainers.image.title: "Gestor de Loterias"
      org.opencontainers.image.description: "Gestão financeira para lotéricas"
    environment:
      DATABASE_URL: postgresql://gestor:${POSTGRES_PASSWORD:-gestor}@postgres:5432/gestor
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD: ${APP_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      SESSION_VERSION: ${SESSION_VERSION:-1}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      OCR_SERVICE_URL: http://ocr:8000
      OLLAMA_URL: ${OLLAMA_URL:-http://192.168.1.10:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5vl:3b}
      TRUSTED_PROXY_IP: ${TRUSTED_PROXY_IP:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ocr:
        condition: service_started
    restart: unless-stopped

  ocr:
    image: guslma/gestor-de-loterias-ocr:latest
    build:
      context: services/ocr
    platform: linux/amd64
    volumes:
      - ocr-models:/root/.paddleocr
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestor}
      POSTGRES_DB: gestor
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db:
  uploads:
  ocr-models:
